<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BOCCO Notification</title>
</head>
<body>
  <div class="p-3">

    <div class="mb-3">
      <label class="form-label fw-semibold">Name</label>
      <input id="name" type="text" class="form-control" placeholder="Bocco Notification" />
    </div>

    <hr />
    <h6 class="mb-3">BOCCO Account</h6>

    <div class="mb-3">
      <label class="form-label">API Key</label>
      <input id="apiKey" type="text" class="form-control" placeholder="Your BOCCO API key" />
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-control" placeholder="you@example.com" />
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input id="password" type="password" class="form-control" />
    </div>

    <button id="loadRoomsBtn" type="button" class="btn btn-outline-secondary btn-sm mb-4">
      Load Rooms
    </button>

    <hr />
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="mb-0">Notification Buttons</h6>
      <button id="addBtn" type="button" class="btn btn-outline-primary btn-sm">+ Add</button>
    </div>

    <div id="messages"></div>

  </div>

  <script>
    let pluginConfig = [];
    let rooms = [];

    function esc(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function buildRoomSelect(selectedUuid) {
      const select = document.createElement('select');
      select.className = 'form-select form-select-sm msg-room';

      if (rooms.length === 0) {
        select.appendChild(new Option('— Click "Load Rooms" to select —', ''));
      } else {
        select.appendChild(new Option('— Select a room —', ''));
        rooms.forEach(r => {
          select.appendChild(new Option(r.name, r.uuid, false, r.uuid === selectedUuid));
        });
      }

      // Saved UUID not in the room list — keep it as a fallback option
      if (selectedUuid && !Array.from(select.options).some(o => o.value === selectedUuid)) {
        select.insertBefore(new Option(`${selectedUuid} (saved)`, selectedUuid, false, true), select.options[0]);
      }

      return select;
    }

    function refreshRoomDropdowns() {
      document.querySelectorAll('.msg-room').forEach(select => {
        const currentValue = select.value;
        select.replaceWith(buildRoomSelect(currentValue));
      });
    }

    function getMessages() {
      return Array.from(document.querySelectorAll('.msg-row')).map(row => ({
        name:     row.querySelector('.msg-name').value.trim(),
        roomUuid: row.querySelector('.msg-room').value,
        text:     row.querySelector('.msg-text').value.trim(),
      }));
    }

    function addMessageRow(msg = { name: '', roomUuid: '', text: '' }) {
      const container = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'card mb-2 msg-row';

      row.innerHTML = `
        <div class="card-body">
          <div class="mb-2">
            <label class="form-label">Button Name</label>
            <input type="text" class="form-control form-control-sm msg-name"
              value="${esc(msg.name)}" placeholder="e.g. 玄関チャイム" />
          </div>
          <div class="mb-2 room-field">
            <label class="form-label">Room</label>
          </div>
          <div class="mb-2">
            <label class="form-label">Message Text</label>
            <input type="text" class="form-control form-control-sm msg-text"
              value="${esc(msg.text)}" placeholder="e.g. お客様がいらっしゃいました" />
          </div>
          <button type="button" class="btn btn-outline-danger btn-sm remove-btn">Remove</button>
        </div>
      `;

      // select → invalid-feedback の順で挿入する（Bootstrap の仕様）
      const roomField = row.querySelector('.room-field');
      roomField.appendChild(buildRoomSelect(msg.roomUuid || ''));
      const feedback = document.createElement('div');
      feedback.className = 'invalid-feedback';
      feedback.textContent = 'Room を選択してください。';
      roomField.appendChild(feedback);

      row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
      container.appendChild(row);
    }

    // Room が未選択のドロップダウンにエラー表示を付ける
    function validateRooms() {
      document.querySelectorAll('.msg-row').forEach(row => {
        const select = row.querySelector('.msg-room');
        const isEmpty = !select.value;
        select.classList.toggle('is-invalid', isEmpty);
      });
    }

    // フォームの変更内容をメモリ上の config に同期する
    // ネイティブの Homebridge Save ボタンが常に最新の値を保存できるようにするため
    async function syncConfig() {
      if (pluginConfig.length === 0) return;
      pluginConfig[0].name     = document.getElementById('name').value.trim() || 'Bocco Notification';
      pluginConfig[0].api_key  = document.getElementById('apiKey').value.trim();
      pluginConfig[0].email    = document.getElementById('email').value.trim();
      pluginConfig[0].password = document.getElementById('password').value;
      pluginConfig[0].messages = getMessages();
      validateRooms();
      try {
        await homebridge.updatePluginConfig(pluginConfig);
      } catch (e) {
        console.error('[BOCCO] syncConfig failed:', e);
      }
    }

    ['name', 'apiKey', 'email', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', syncConfig);
    });
    document.getElementById('messages').addEventListener('change', syncConfig);
    document.getElementById('messages').addEventListener('input', syncConfig);

    document.getElementById('loadRoomsBtn').addEventListener('click', async () => {
      const api_key  = document.getElementById('apiKey').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!api_key || !email || !password) {
        alert('API Key, Email, and Password are required.');
        return;
      }

      homebridge.showSpinner();
      try {
        rooms = await homebridge.request('/rooms', { api_key, email, password });
        refreshRoomDropdowns();
        validateRooms();
        homebridge.toast.success(`Loaded ${rooms.length} room(s).`);
      } catch (e) {
        alert(e.error || 'Failed to load rooms.');
      } finally {
        homebridge.hideSpinner();
      }
    });

    document.getElementById('addBtn').addEventListener('click', () => {
      addMessageRow();
      validateRooms();
    });

    // Initialize: load config, auto-fetch rooms, then render messages
    (async () => {
      pluginConfig = await homebridge.getPluginConfig();

      if (pluginConfig.length === 0) {
        pluginConfig.push({ platform: 'BoccoNotification', name: 'Bocco Notification' });
        await homebridge.updatePluginConfig(pluginConfig);
      }

      const config = pluginConfig[0];

      document.getElementById('name').value     = config.name     || '';
      document.getElementById('apiKey').value   = config.api_key  || '';
      document.getElementById('email').value    = config.email    || '';
      document.getElementById('password').value = config.password || '';

      if (config.api_key && config.email && config.password) {
        homebridge.showSpinner();
        try {
          rooms = await homebridge.request('/rooms', {
            api_key:  config.api_key,
            email:    config.email,
            password: config.password,
          });
        } catch {
          // Silently ignore — user can click "Load Rooms" manually
        } finally {
          homebridge.hideSpinner();
        }
      }

      (config.messages || []).forEach(msg => addMessageRow(msg));
      validateRooms();
    })();
  </script>
</body>
</html>
